<!DOCTYPE html>

{% load static %}

<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% block title_block %}
    Concertainly
    {% endblock %}
  </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'stylesheet.css' %}" type="text/css" />
</head>

<body>
  <div>
    <nav class="navbar navbar-expand-lg narbar-translucent fixed-top" data-bs-theme="dark" style="background-color: rgba(30, 30, 47, 0.7);">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'concertainly:home' %}">CONCERTAINLY!</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav mx-auto d-flex gap-4 mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{% url 'concertainly:home' %}">HOME</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{% url 'concertainly:genres' %}">GENRES</a>
            </li>
            <li class="nav-item">
              {% if user.is_authenticated %}
              <a class="nav-link active" aria-current="page" href="{% url 'concertainly:logout' %}">LOGOUT</a>
              {% else %}
              <a class="nav-link active" aria-current="page" href="{% url 'concertainly:login' %}">LOGIN</a>
              {% endif %}
            </li>
            <li class="nav-item">
              {% if not user.is_authenticated %}
              <a class="nav-link active" aria-current="page" href="{% url 'concertainly:register' %}">REGISTER</a>
              {% endif %}
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{% url 'concertainly:search' %}">SEARCH</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </div>
  <div data-bs-theme="dark">
    {% block body_block %}
    {% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
