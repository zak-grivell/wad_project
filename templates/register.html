{% extends 'base.html' %}

{% block title_block %}
    Register
{% endblock %}

{% block body_block %}
<h1>Register to Concert-ainly!</h1>
{% if registered %}
    <strong>Thank you for registering!</strong>
    <a href="{% url 'concertainly:home' %}">Return to the homepage.</a><br />
{% else %}
    <strong>Register here!</strong><br />
    <form id="user_form" method="post" action="{% url 'concertainly:home' %}" enctype="multipart/form-data">
        {% csrf_token %}
        {{ user_form.as_p }}
    <input type="submit" name="submit" value="Register" />
    </form>
{% endif %}
{% endblock %}
