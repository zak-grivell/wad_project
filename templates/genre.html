{% extends 'base.html' %}

{% block title_block %}
    Genre
{% endblock %}

{% block body_block %}
<div class="container py-5">
    {% if genre %}
            <h1 id="artistName">{{ genre.name }}</h1><br>
    {% endif %}

    {% if artists %}
        <div class="col artist-card">
        <div class="row row-cols-2 row-cols-md-3 g-4">
            {% for artist in artists %}
            <div class="card">
                <img src="" class="card-img-top" alt="artist image">
                <div class="card-body">
                <p><a href="{% url 'concertainly:artist' artist.name %}" class="btn btn-dark">{{ artist.name }}</a></p>
                </div>
            </div>
            {% endfor %}
        </div>
        </div>
    {% endif %}
</div>
{% endblock %}
