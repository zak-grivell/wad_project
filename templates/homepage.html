{% extends 'base.html' %}
{% load static %}

{% block title_block %}
    Homepage
{% endblock %}

{% block body_block %}

{% if highlight_tour %}

<div class="highlight-tour-carousel">
  <div id="highlightTours" class="carousel slide">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#highlightTours" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#highlightTours" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#highlightTours" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="{% static tour1.image %}" class="d-block w-100" alt="highlight tour">
        <div class="carousel-caption d-none d-md-block">
          <p><a href="{% url 'concertainly:tour' tour1.slug %}" class="btn btn-dark">{{ tour1.name }}</a></p>
        </div>
      </div>
      <div class="carousel-item">
        <img src="{% static tour2.image %}" class="d-block w-100" alt="highlight tour">
        <div class="carousel-caption d-none d-md-block">
          <p><a href="{% url 'concertainly:tour' tour2.slug %}" class="btn btn-dark">{{ tour2.name }}</a></p>
        </div>
      </div>
      <div class="carousel-item">
        <img src="{% static tour3.image %}" class="d-block w-100" alt="highlight tour">
        <div class="carousel-caption d-none d-md-block">
          <p><a href="{% url 'concertainly:tour' tour3.slug %}" class="btn btn-dark">{{ tour3.name }}</a></p>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#highlightTours" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#highlightTours" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>

{% endif %}

<br>

<div class="col popular-tour-card">
  <div class="row row-cols-2 row-cols-md-3 g-4">
    {% for tour in popular_tours %}
      <div class="card">
        <img src="{% static tour.image %}" class="card-img-top" alt="popular tour">
        <div class="card-body">
          <p><a href="{% url 'concertainly:tour' tour.slug %}" class="btn btn-dark">{{ tour.name }}</a></p>
        </div>
      </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
